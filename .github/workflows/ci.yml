name: CI - NewSense AI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint Backend (Mock)
        run: echo "Linting backend..."
      - name: Lint Frontend
        run: |
          cd frontend
          npm install
          npm run lint

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: newsense
          POSTGRES_DB: newsense_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-mock
      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql+asyncpg://newsense:password@localhost/newsense_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: testing-secret
        run: |
          cd backend
          pytest tests/ -v --tb=short

  build-docker:
    needs: [lint, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t newsense-backend ./backend
      - name: Build Frontend Image
        run: docker build -t newsense-frontend ./frontend
