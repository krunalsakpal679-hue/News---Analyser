# docker-compose.prod.yml
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: newsense
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: newsense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://newsense:${DB_PASSWORD}@postgres/newsense
      - REDIS_URL=redis://redis:6379/0
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      target: production
    restart: always
    command: celery -A app.celery.app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://newsense:${DB_PASSWORD}@postgres/newsense
      - REDIS_URL=redis://redis:6379/0
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: build-stage
      args:
        - VITE_API_URL=/api/v1

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  frontend_build:
